name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: changeguard-x86_64-unknown-linux-gnu
            archive: tar
            binary: changeguard
          - os: windows-latest
            asset: changeguard-x86_64-pc-windows-msvc
            archive: zip
            binary: changeguard.exe
          - os: macos-13
            asset: changeguard-x86_64-apple-darwin
            archive: tar
            binary: changeguard
          - os: macos-14
            asset: changeguard-aarch64-apple-darwin
            archive: tar
            binary: changeguard

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked
      - name: Package Unix
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.asset }}
          cp target/release/${{ matrix.binary }} dist/${{ matrix.asset }}/
          cp README.md LICENSE dist/${{ matrix.asset }}/
          tar -czf dist/${{ matrix.asset }}.tar.gz -C dist ${{ matrix.asset }}
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.asset }}" | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}/"
          Copy-Item README.md,LICENSE "dist/${{ matrix.asset }}/"
          Compress-Archive -Path "dist/${{ matrix.asset }}/*" -DestinationPath "dist/${{ matrix.asset }}.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
