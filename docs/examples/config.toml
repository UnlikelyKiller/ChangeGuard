[core]
strict = false
auto_fix = false

[watch]
debounce_ms = 1000
ignore_patterns = ["dist/**", "coverage/**"]

[gemini]
# Prefer GEMINI_API_KEY in the environment or local .env.
# model = "gemini-3.1-pro-preview" # optional override for every ask mode
fast_model = "gemini-3.1-flash-lite-preview"
deep_model = "gemini-3.1-pro-preview"
timeout_secs = 120
context_window = 128000

[temporal]
max_commits = 1000
max_files_per_commit = 50
coupling_threshold = 0.75
all_parents = false

[hotspots]
max_commits = 500
limit = 10
