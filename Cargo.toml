[package]
name = "changeguard"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }

serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"
toml = "1.1.2"

anyhow = "1.0.102"
miette = { version = "7.6.0", features = ["fancy"] }
thiserror = "2.0"

tracing = "0.1"
tracing-subscriber = { version = "0.3.20", features = ["fmt", "env-filter"] }

notify-debouncer-full = "0.7.0"
globset = "0.4.18"

camino = { version = "1.2.2", features = ["serde1"] }

rusqlite = { version = "0.39.0", features = ["bundled"] }
rusqlite_migration = "2.5.0"

uuid = { version = "1.23", features = ["v4", "serde"] }
gix = "0.81.0"

regex = "1.12"
parking_lot = "0.12"

tree-sitter = "0.26.8"
tree-sitter-rust = "0.24.2"
tree-sitter-typescript = "0.23.2"
tree-sitter-python = "0.25.0"
owo-colors = { version = "4.3.0", features = ["supports-colors"] }
chrono = { version = "0.4.44", features = ["serde"] }
wait-timeout = "0.2"
comfy-table = "7.1"
indicatif = "0.18"
ctrlc = "3.4"
sysinfo = "0.33"

# Daemon dependencies
tokio = { version = "1.43", features = ["rt-multi-thread", "io-std", "macros", "time"], optional = true }
tower-lsp-server = { version = "0.23.0", optional = true }
blake3 = "1.8"
dunce = "1.0.5"
path-clean = "1.0.1"

[features]
default = []
daemon = ["dep:tower-lsp-server", "dep:tokio"]

[dev-dependencies]
tempfile = "3"
