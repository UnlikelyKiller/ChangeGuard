[advisories]
version = 2
yanked = "deny"
ignore = [
    # Cozo 0.7.6 transitively pins these Sled/graph dependencies and no
    # compatible safe upgrade exists without replacing Cozo storage.
    "RUSTSEC-2024-0384",
    "RUSTSEC-2025-0056",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0052",
    "RUSTSEC-2025-0141",
    "RUSTSEC-2026-0041",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/UnlikelyKiller/cozo-redux",
]
